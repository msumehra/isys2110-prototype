<!DOCTYPE HTML>
<html>

<head>
    <title>Find a Ride</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="search-box">

        <div class="top-bar">
            <h2>Find a Ride</h2>
        </div>

        <div class="content">

            <div class="steps">
                <div class="active-step">
                    1 Search Ride
                </div>

                <div>
                    2 View Matches
                </div>

                <div>
                    3 Request Ride
                </div>

                <div>
                    4 Confirmation
                </div>
            </div>

            <div class="form-section">

                <label>From (Pickup Location)</label>
                <input type="text" placeholder="e.g Suburb Station">

                <label>To (Destination)</label>
                <input type="text" placeholder="e.g. City Centre">

                <div class="row">

                    <div>
                        <label>Date</label>
                        <input type="date">
                    </div>

                    <div>
                        <label>Time</label>
                        <input type="time">
                    </div>
                </div>

                <a href="matches.html" class="search-button">
                    Search Rides
                </a>

            </div>
        </div>
    </div>
</body>
</html>
