<!DOCTYPE html>
<html>

<head>
    <title>Ride Requests</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="requests-box">

    <!-- TOP BAR -->

    <div class="green-top-bar">
        <h2>Ride Requests</h2>
    </div>

    <!-- REQUEST 1 -->

    <div class="request-card">

        <div class="profile">

            <div class="empty-profile">
                👤
            </div>

            <div>
                <h3>Profile1 ⭐ 4.5</h3>
                <p>12 rides</p>
            </div>

        </div>

        <div class="match-info">

            <p>Route Match: <span>Yes</span></p>

            <p>Time Match: <span>Yes</span></p>

        </div>

        <div class="request-buttons">

            <button class="accept-btn"
            onclick="showAccept(this)">
                Accept
            </button>

            <button class="decline-btn"
            onclick="showDecline(this)">
                Decline
            </button>

            <div class="accepted-message">
                ✅ Request Accepted
            </div>

            <div class="declined-message">
                ❌ Request Declined
            </div>

        </div>

    </div>

    <!-- REQUEST 2 -->

    <div class="request-card">

        <div class="profile">

            <div class="empty-profile">
                👤
            </div>

            <div>
                <h3>Profile2 ⭐ 4.7</h3>
                <p>20 rides</p>
            </div>

        </div>

        <div class="match-info">

            <p>Route Match: <span>Yes</span></p>

            <p>Time Match: <span>Yes</span></p>

        </div>

        <div class="request-buttons">

            <button class="accept-btn"
            onclick="showAccept(this)">
                Accept
            </button>

            <button class="decline-btn"
            onclick="showDecline(this)">
                Decline
            </button>

            <div class="accepted-message">
                ✅ Request Accepted
            </div>

            <div class="declined-message">
                ❌ Request Declined
            </div>

        </div>

    </div>

</div>

<script>

function showAccept(button) {

let message =
button.parentElement.querySelector(".accepted-message");

message.style.display = "block";

}

function showDecline(button) {

let message =
button.parentElement.querySelector(".declined-message");

message.style.display = "block";

}

</script>

</body>
</html>
