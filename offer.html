<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NeighbourLink | Offer a Ride</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header compact">
      <a class="brand" href="index.html">
        <span class="brand-mark">car</span>
        <span>NeighbourLink</span>
      </a>
      <nav class="top-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="find.html">Find a Ride</a>
        <a href="offer.html" aria-current="page">Offer a Ride</a>
        <a href="help.html">Help</a>
        <a href="login.html">Log In</a>
        <a class="nav-button" href="signup.html">Sign Up</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="app-frame">
        <div class="app-title">
          <h1>Offer a ride</h1>
          <span class="hamburger" aria-hidden="true"></span>
        </div>
        <section class="form-panel full-panel">
          <h2>Ride offer details</h2>
          <div class="field-row">
            <label>Start location<input type="text" value="North suburb" readonly></label>
            <label>Destination<input type="text" value="City centre" readonly></label>
          </div>
          <div class="field-row triple">
            <label>Date<input type="text" value="22/05/26" readonly></label>
            <label>Departure time<input type="text" value="7:30 am" readonly></label>
            <label>Seats available<input type="text" value="2" readonly></label>
          </div>
          <label>Route notes<textarea readonly>Pickup near suburb station. Direct route to city centre, no route optimisation.</textarea></label>
          <div class="button-row">
            <a class="button secondary" href="index.html">Cancel</a>
            <a class="button" href="driver.html">Review requests</a>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
