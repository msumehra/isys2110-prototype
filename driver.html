<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NeighbourLink | Ride Requests</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header compact">
      <a class="brand" href="index.html">
        <span class="brand-mark">car</span>
        <span>NeighbourLink</span>
      </a>
      <nav class="top-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="find.html">Find a Ride</a>
        <a href="offer.html" aria-current="page">Offer a Ride</a>
        <a href="help.html">Help</a>
        <a href="login.html">Log In</a>
        <a class="nav-button" href="signup.html">Sign Up</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="app-frame">
        <div class="app-title">
          <h1>Ride requests</h1>
          <span class="hamburger" aria-hidden="true"></span>
        </div>
        <section class="list-panel driver-list" aria-label="Incoming rider requests">
          <article class="request-row">
            <div class="avatar" aria-hidden="true"></div>
            <div class="driver-summary">
              <strong>Sam Carter</strong>
              <span>Rating 4.5</span>
            </div>
            <div class="match-summary">
              <span><strong>Route match:</strong> Yes</span>
              <span><strong>Time match:</strong> Yes</span>
              <span><strong>Seats needed:</strong> 1</span>
            </div>
            <div class="actions">
              <a class="button accept" href="driver.html">Accept</a>
              <a class="button decline" href="driver.html">Decline</a>
            </div>
          </article>

          <article class="request-row">
            <div class="avatar" aria-hidden="true"></div>
            <div class="driver-summary">
              <strong>Priya Shah</strong>
              <span>Rating 4.7</span>
            </div>
            <div class="match-summary">
              <span><strong>Route match:</strong> Yes</span>
              <span><strong>Time match:</strong> Yes</span>
              <span><strong>Seats needed:</strong> 1</span>
            </div>
            <div class="actions">
              <a class="button accept" href="driver.html">Accept</a>
              <a class="button decline" href="driver.html">Decline</a>
            </div>
          </article>
        </section>
      </section>
    </main>
  </body>
</html>
